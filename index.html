<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>도전감 挑戰感 — Plan · Produce · Prove</title>
  <meta name="description" content="도전감 — AI 시대의 콘텐츠 스튜디오. 독립영화, 광고, 뮤직비디오, 애니메이션.">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0e0b10;
      --bg-card: #161219;
      --bg-card-hover: #1e1922;
      --text-primary: #f0ece6;
      --text-secondary: #8a8490;
      --accent-yellow: #FED766;
      --accent-blue: #00B4D8;
      --accent-blue-deep: #0077B6;
      --accent-blue-light: #90E0EF;
      --line: rgba(255,255,255,0.06);
    }

    html {
      scroll-behavior: smooth;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background: var(--bg);
      overflow-x: hidden;
    }

    /* ─── NAV ─── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 1.5rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(to bottom, rgba(14,11,16,0.95), transparent);
      transition: background 0.4s;
    }

    nav.scrolled {
      background: rgba(14,11,16,0.97);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .nav-logo {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text-primary);
      text-decoration: none;
    }

    .nav-logo span {
      font-weight: 400;
      color: var(--text-secondary);
      margin-left: 0.5rem;
      font-size: 0.8rem;
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: color 0.3s;
    }

    .nav-links a:hover {
      color: var(--text-primary);
    }

    /* ─── HERO ─── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 45%, rgba(0,180,216,0.04), transparent),
        radial-gradient(ellipse 40% 30% at 30% 60%, rgba(254,215,102,0.03), transparent);
      pointer-events: none;
    }

    .hero-showreel {
      width: 72%;
      max-width: 960px;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: 4px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 40px 100px rgba(0,0,0,0.6);
    }

    .hero-showreel iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .hero-showreel-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #111 0%, #1a1520 100%);
      color: var(--text-secondary);
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .hero-title {
      margin-top: 3rem;
      text-align: center;
    }

    .hero-title img {
      max-width: 780px;
      width: 90%;
      height: auto;
      opacity: 0;
      mix-blend-mode: lighten;
      animation: fadeUp 1s ease 0.3s forwards;
    }

    /* ─── WORKS ─── */
    .section {
      padding: 8rem 3rem;
    }

    .section-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent-blue);
      margin-bottom: 1rem;
    }

    .section-title {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 4rem;
      line-height: 1.3;
    }

    .works-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .work-card {
      position: relative;
      aspect-ratio: 16/10;
      background: var(--bg-card);
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.4s ease, box-shadow 0.4s ease;
      border: 1px solid var(--line);
    }

    .work-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      border-color: rgba(255,255,255,0.1);
    }

    .work-card-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-card-hover) 100%);
      transition: opacity 0.4s;
    }

    .work-card:hover .work-card-bg {
      opacity: 0.7;
    }

    .work-card-content {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1.8rem;
      background: linear-gradient(to top, rgba(14,11,16,0.95) 0%, transparent 100%);
      z-index: 2;
    }

    .work-card-category {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent-yellow);
      margin-bottom: 0.5rem;
    }

    .work-card-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .work-card-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 2;
    }

    .work-card:hover .work-card-icon {
      opacity: 1;
    }

    .work-card-icon svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: var(--text-primary);
      stroke-width: 2;
    }

    /* ─── CONTACT ─── */
    .contact {
      padding: 10rem 3rem;
      text-align: center;
      position: relative;
    }

    .contact::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--line), transparent);
    }

    .contact-headline {
      font-size: 2.8rem;
      font-weight: 700;
      margin-bottom: 2rem;
      line-height: 1.3;
    }

    .contact-email {
      font-size: 1.1rem;
      color: var(--accent-blue);
      text-decoration: none;
      font-weight: 500;
      letter-spacing: 0.04em;
      transition: color 0.3s;
      border-bottom: 1px solid transparent;
      padding-bottom: 2px;
    }

    .contact-email:hover {
      color: var(--accent-blue-light);
      border-bottom-color: var(--accent-blue-light);
    }

    /* ─── FOOTER ─── */
    footer {
      padding: 3rem;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-copy {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .footer-links {
      display: flex;
      gap: 1.5rem;
    }

    .footer-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.78rem;
      font-weight: 500;
      transition: color 0.3s;
    }

    .footer-links a:hover {
      color: var(--text-primary);
    }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-in {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 900px) {
      nav { padding: 1.2rem 1.5rem; }
      .nav-links { gap: 1.5rem; }
      .hero-showreel { width: 90%; }
      .hero-title img { max-width: 560px; }
      .section { padding: 5rem 1.5rem; }
      .works-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
      .contact { padding: 6rem 1.5rem; }
      .contact-headline { font-size: 2rem; }
      footer { padding: 2rem 1.5rem; flex-direction: column; gap: 1rem; text-align: center; }
    }

    @media (max-width: 580px) {
      .nav-links { display: none; }
      .hero-showreel { width: 95%; }
      .hero-title img { max-width: 400px; }
      .works-grid { grid-template-columns: 1fr; }
      .section-title { font-size: 1.6rem; }
      .contact-headline { font-size: 1.6rem; }
    }
  </style>
</head>

  <script>
    // Nav scroll effect
    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 60);
    });

    // Scroll fade-in
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.15 });

    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
  </script>
